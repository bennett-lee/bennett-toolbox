name: 构建桌面安装包

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact-name: macos-package
            artifact-path: |
              release/*.dmg
              release/*.dmg.blockmap
            build-command: CSC_IDENTITY_AUTO_DISCOVERY=false npm run build -- --mac --publish never
          - label: Windows x64
            os: windows-latest
            artifact-name: windows-package
            artifact-path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
            build-command: npm run build -- --win --x64 --publish never

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.6
          cache: npm

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: npm ci

      - name: 在 macOS 构建内置 MarkItDown
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python3 -m venv build_tools/markitdown-venv
          build_tools/markitdown-venv/bin/pip install --upgrade pip
          build_tools/markitdown-venv/bin/pip install pyinstaller 'markitdown[all]'
          rm -rf build_tools/markitdown-dist build_tools/markitdown-build vendor/markitdown
          mkdir -p vendor/markitdown
          build_tools/markitdown-venv/bin/pyinstaller \
            --clean \
            --onefile \
            --collect-data magika \
            --name markitdown \
            --distpath build_tools/markitdown-dist \
            --specpath build_tools/markitdown-build \
            --workpath build_tools/markitdown-build \
            scripts/markitdown_launcher.py
          cp build_tools/markitdown-dist/markitdown vendor/markitdown/markitdown
          chmod +x vendor/markitdown/markitdown

      - name: 在 Windows 构建内置 MarkItDown
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv build_tools/markitdown-venv
          .\build_tools\markitdown-venv\Scripts\python.exe -m pip install --upgrade pip
          .\build_tools\markitdown-venv\Scripts\pip.exe install pyinstaller 'markitdown[all]'
          Remove-Item -Recurse -Force build_tools\markitdown-dist, build_tools\markitdown-build, vendor\markitdown -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force vendor\markitdown
          .\build_tools\markitdown-venv\Scripts\pyinstaller.exe `
            --clean `
            --onefile `
            --collect-data magika `
            --name markitdown `
            --distpath build_tools\markitdown-dist `
            --specpath build_tools\markitdown-build `
            --workpath build_tools\markitdown-build `
            scripts\markitdown_launcher.py
          Copy-Item build_tools\markitdown-dist\markitdown.exe vendor\markitdown\markitdown.exe

      - name: 构建安装包
        run: ${{ matrix.build-command }}

      - name: 上传安装包产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish:
    name: 发布最新安装包
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 下载安装包产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 发布 latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          自动构建的桌面安装包，对应提交 ${GITHUB_SHA}。

          可在下方 Assets 中下载 macOS DMG 或 Windows x64 安装包。
          EOF
          gh release delete latest --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
          gh release create latest artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Bennett Toolbox 最新安装包" \
            --notes-file release-notes.md \
            --latest
