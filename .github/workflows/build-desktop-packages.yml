name: Build desktop packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact-name: macos-package
            artifact-path: |
              release/*.dmg
              release/*.dmg.blockmap
            build-command: CSC_IDENTITY_AUTO_DISCOVERY=false npm run build -- --mac
          - label: Windows x64
            os: windows-latest
            artifact-name: windows-package
            artifact-path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
            build-command: npm run build -- --win --x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.17.0
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build bundled MarkItDown on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python3 -m venv build_tools/markitdown-venv
          build_tools/markitdown-venv/bin/pip install --upgrade pip
          build_tools/markitdown-venv/bin/pip install pyinstaller 'markitdown[all]'
          rm -rf build_tools/markitdown-dist build_tools/markitdown-build vendor/markitdown
          mkdir -p vendor/markitdown
          build_tools/markitdown-venv/bin/pyinstaller \
            --clean \
            --onefile \
            --collect-data magika \
            --name markitdown \
            --distpath build_tools/markitdown-dist \
            --specpath build_tools/markitdown-build \
            --workpath build_tools/markitdown-build \
            scripts/markitdown_launcher.py
          cp build_tools/markitdown-dist/markitdown vendor/markitdown/markitdown
          chmod +x vendor/markitdown/markitdown

      - name: Build bundled MarkItDown on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv build_tools/markitdown-venv
          .\build_tools\markitdown-venv\Scripts\python.exe -m pip install --upgrade pip
          .\build_tools\markitdown-venv\Scripts\pip.exe install pyinstaller 'markitdown[all]'
          Remove-Item -Recurse -Force build_tools\markitdown-dist, build_tools\markitdown-build, vendor\markitdown -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force vendor\markitdown
          .\build_tools\markitdown-venv\Scripts\pyinstaller.exe `
            --clean `
            --onefile `
            --collect-data magika `
            --name markitdown `
            --distpath build_tools\markitdown-dist `
            --specpath build_tools\markitdown-build `
            --workpath build_tools\markitdown-build `
            scripts\markitdown_launcher.py
          Copy-Item build_tools\markitdown-dist\markitdown.exe vendor\markitdown\markitdown.exe

      - name: Build installer
        run: ${{ matrix.build-command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish latest GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Automated desktop package build for commit ${GITHUB_SHA}.

          Download the macOS DMG or Windows x64 installer from the assets below.
          EOF
          gh release delete latest --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
          gh release create latest artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Latest Bennett Toolbox build" \
            --notes-file release-notes.md \
            --latest
