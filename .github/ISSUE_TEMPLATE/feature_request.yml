name: 功能建议
description: 为 Bennett Toolbox 提出改进建议。
title: "[功能]: "
labels:
  - 功能建议
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议。请先说明使用场景，再描述希望增加的能力。
  - type: textarea
    id: problem
    attributes:
      label: 使用场景或问题
      description: 请描述你希望 Bennett Toolbox 帮你完成什么任务。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望看到的具体行为。
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 目标平台
      options:
        - macOS
        - Windows
        - 两者都需要
        - 与平台无关
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 请列出你目前使用的替代工具或临时处理方式。
